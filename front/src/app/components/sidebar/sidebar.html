<aside
  class="h-screen bg-white border-r border-gray-200 shadow-sm flex flex-col overflow-hidden transition-all duration-300 ease-in-out shrink-0"
  [class]="sidebarWidth()"
>
  <!-- Header -->
  <div class="h-16 flex items-center px-4 border-b border-gray-100 shrink-0">
    <div
      class="w-8 h-8 rounded-lg bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center shrink-0"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0 1 18 18.75h-2.25m-7.5 0H7.5a2.25 2.25 0 0 1-2.25-2.25V6.108c0-1.135.845-2.098 1.976-2.192.374-.03.748-.057 1.124-.08m0 0a.75.75 0 0 1 .75.75v.75M12 12v.008M12 15v.008M15 12v.008M15 15v.008M9 12v.008M9 15v.008"/>
      </svg>
    </div>
    <span
      class="ml-3 font-bold text-lg text-gray-800 transition-all duration-300 whitespace-nowrap"
      [class.opacity-0]="!isExpanded()"
      [class.pointer-events-none]="!isExpanded()"
    >
      VetPro
    </span>
  </div>

  <!-- Toggle Buttons -->
  <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 shrink-0">
    <button
      (click)="toggleExpand()"
      class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors"
      [disabled]="isHidden()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-transform duration-300"
           [class.rotate-180]="!isExpanded()" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
    <button
      (click)="toggleFocus()"
      class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25" />
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto py-4 space-y-6">
    @for (section of sections(); track section.label) {
      <div>
        <div class="px-4 mb-2">
          <span
            class="block text-[11px] font-bold text-gray-400 uppercase tracking-[0.12em] transition-all duration-300"
            [class.opacity-0]="!isExpanded()"
            [class.pointer-events-none]="!isExpanded()"
          >
            {{ section.label }}
          </span>
        </div>
        @for (item of section.items; track item.label) {
          <a
            [routerLink]="[item.route]"
            routerLinkActive="bg-green-50 border-l-4 border-green-500 text-green-700"
            [routerLinkActiveOptions]="{ exact: item.route === '/' || item.route === '/admin' || item.route === '/veterinario' }"
            class="group flex items-center h-10 mx-2 rounded-lg border-l-4 border-transparent text-gray-700 hover:bg-gray-100 hover:text-gray-900 transition-all duration-200"
          >
            <div class="w-10 flex items-center justify-center shrink-0" [innerHTML]="getSvg(item.icon)"></div>
            <span
              class="ml-2 text-sm font-medium transition-all duration-300 whitespace-nowrap"
              [class.opacity-0]="!isExpanded()"
              [class.pointer-events-none]="!isExpanded()"
            >
              {{ item.label }}
            </span>
          </a>
        }
      </div>
    }
  </nav>

  <!-- User Profile Footer -->
  <div class="shrink-0 border-t border-gray-100">
    <div class="px-3 py-3">
      <div class="flex items-center">
        <div
          class="w-8 h-8 rounded-full bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center text-white text-sm font-bold shrink-0 shadow-sm"
        >
          {{ userInitials() }}
        </div>
        <div
          class="ml-3 overflow-hidden transition-all duration-300"
          [class.opacity-0]="!isExpanded()"
          [class.pointer-events-none]="!isExpanded()"
        >
          <p class="text-sm font-semibold text-gray-800 truncate leading-tight">{{ userName() }}</p>
          <p class="text-xs text-gray-500 truncate leading-tight">{{ userRole() }}</p>
        </div>
      </div>
      <button
        (click)="logout()"
        class="mt-2 w-full flex items-center justify-center h-9 rounded-lg text-red-600 hover:bg-red-50 transition-colors text-sm font-medium gap-2"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
        </svg>
        <span
          class="transition-all duration-300 whitespace-nowrap"
          [class.opacity-0]="!isExpanded()"
          [class.pointer-events-none]="!isExpanded()"
        >
          Cerrar sesión
        </span>
      </button>
    </div>
  </div>
</aside>
