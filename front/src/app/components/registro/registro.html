<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">

  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="mt-10 text-center text-2xl font-bold tracking-tight text-gray-900">
      🐾 Crear cuenta
    </h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">

    <form (ngSubmit)="onRegistro()" #form="ngForm" class="space-y-6">

      <div>
        <label class="block text-sm font-medium text-gray-900">
          Nombre completo
        </label>

        <input type="text"
               name="nombres"
               [(ngModel)]="nuevoUsuario.nombres"
               required
               placeholder="Tu nombre"
               class="mt-2 block w-full rounded-md bg-white px-3 py-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-900">
          Apellidos
        </label>

        <input type="text"
               name="apellidos"
               [(ngModel)]="nuevoUsuario.apellidos"
               required
               placeholder="Tu apellido"
               class="mt-2 block w-full rounded-md bg-white px-3 py-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-900">
          Correo Electrónico
        </label>

        <input type="email"
               name="correo"
               [(ngModel)]="nuevoUsuario.correo"
               required
               placeholder="correo@ejemplo.com"
               class="mt-2 block w-full rounded-md bg-white px-3 py-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-900">
          Contraseña
        </label>

        <input type="password"
               name="contrasena"
               [(ngModel)]="nuevoUsuario.contrasena"
               required
               placeholder="********"
               class="mt-2 block w-full rounded-md bg-white px-3 py-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>

      <div>
        <button type="submit"
                [disabled]="form.invalid"
                class="w-full flex justify-center rounded-md bg-green-500 hover:bg-green-600 px-4 py-2 font-semibold text-white shadow-md disabled:bg-gray-400">
          Registrarse
        </button>
      </div>

    </form>
  </div>
</div>
