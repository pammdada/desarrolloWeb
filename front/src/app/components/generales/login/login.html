<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">

  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="mt-10 text-center text-2xl font-bold tracking-tight text-gray-900">
       Inicio de sesión
    </h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">

    <form (ngSubmit)="onLogin()" #form="ngForm" class="space-y-6">

      <div>
        <label class="block text-sm font-medium text-gray-900">
          Correo Electrónico
        </label>

        <div class="mt-2">
          <input type="email"
                 name="correo" required
                 [(ngModel)]="credentials.correo"
                 placeholder="admin@vet.com"
                 class="block w-full rounded-md bg-white px-3 py-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label class="block text-sm font-medium text-gray-900">
            Contraseña
          </label>

          <a href="#" class="text-sm font-semibold text-green-500 hover:text-green-600">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <div class="mt-2">
          <input type="password"
                 name="contrasena" required
                 [(ngModel)]="credentials.contrasena"
                 placeholder="********"
                 class="block w-full rounded-md bg-white px-3 py-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500" />
        </div>
      </div>

      <div>
        <button type="submit"
                [disabled]="form.invalid"
                class="w-full flex justify-center rounded-md bg-green-500 hover:bg-green-600 px-4 py-2 font-semibold text-white shadow-md disabled:bg-gray-400">
          Iniciar sesión
        </button>
      </div>

    </form>

    <!--  Enlace directo a Registrarse  -->
    <p class="mt-6 text-center text-sm text-gray-500">
      ¿No tienes cuenta?
      <a (click)="irARegistro()" class="font-semibold text-green-500 hover:text-green-600 cursor-pointer">
        Regístrate
      </a>
    </p>

  </div>
</div>
