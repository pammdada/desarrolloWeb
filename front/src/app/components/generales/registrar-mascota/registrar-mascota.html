<!-- boton de retorno circular fuera del formulario -->
<div class="max-w-lg mx-auto mt-10">
    <a routerLink="/cliente"
       class="inline-flex items-center justify-center w-10 h-10 bg-green-500 text-white rounded-full hover:bg-green-600 transition shadow-md"
       title="Volver al inicio">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
    </a>
</div>

<div class="max-w-lg mx-auto mt-4 p-8 bg-white rounded-2xl shadow-2xl border-b-8 border-green-500">
    <h2 class="text-3xl font-extrabold text-gray-800 mb-6 text-center">Registrar Nueva Mascota</h2>
    <hr class="mb-5">

    <form (ngSubmit)="guardarMascota()" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700">Nombre de la mascota</label>
            <input type="text" name="nombre" [(ngModel)]="nuevaMascota.nombre" required
                class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-green-400 outline-none transition">
            <small *ngIf="errores.nombre" class="text-red-500 text-xs">{{ errores.nombre }}</small>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Especie</label>
                <select name="tipo" [(ngModel)]="nuevaMascota.tipo"
                    class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-green-400 outline-none" required>
                    <option value="Perro">Perro</option>
                    <option value="Gato">Gato</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Raza</label>
                <input type="text" name="raza" [(ngModel)]="nuevaMascota.raza" (input)="validarRaza()"
                    class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-green-400 outline-none transition" required>
                <small *ngIf="errores.raza" class="text-red-500 text-xs">{{ errores.raza }}</small>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700">Edad (anios)</label>
            <input type="number" name="edad" [(ngModel)]="nuevaMascota.edad" (input)="validarEdad()"
                class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-green-400 outline-none transition" required>
            <small *ngIf="errores.edad" class="text-red-500 text-xs">{{ errores.edad }}</small>
        </div>

        <button type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl shadow-lg transform hover:scale-105 transition duration-300">
            Guardar Mascota
        </button>
    </form>
</div>
