<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="mt-10 text-center text-2xl font-bold tracking-tight text-gray-900">
      Verificar código
    </h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form (ngSubmit)="verificarToken()" #form="ngForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-900">Correo Electrónico</label>
        <div class="mt-2">
          <input type="email" name="correo" required [(ngModel)]="data.correo" placeholder="tu@correo.com" class="block w-full rounded-md bg-white px-3 py-2 border border-gray-300" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-900">Código</label>
        <div class="mt-2">
          <input type="text" name="token" required [(ngModel)]="data.token" placeholder="123456" class="block w-full rounded-md bg-white px-3 py-2 border border-gray-300" />
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="form.invalid" class="w-full flex justify-center rounded-md bg-green-500 px-4 py-2 text-white">Verificar</button>
      </div>
    </form>

    <!--  Enlace directo a Iniciar Sesión sin pasar por home -->
    <p class="mt-6 text-center text-sm text-gray-500">
      <a (click)="irALogin()" class="font-semibold text-green-500 hover:text-green-600 cursor-pointer">
        Volver a Iniciar Sesión
      </a>
    </p>

  </div>
</div>
