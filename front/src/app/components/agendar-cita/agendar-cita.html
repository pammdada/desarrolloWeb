<div class="min-h-screen bg-gray-100 py-10 px-4">
    <!-- boton de retorno circular fuera del formulario -->
    <div class="max-w-md mx-auto mb-4">
        <a routerLink="/cliente"
            class="inline-flex items-center justify-center w-10 h-10 bg-green-500 text-white rounded-full hover:bg-green-600 transition shadow-md"
            title="Volver al inicio">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="bg-green-500 p-4">
            <h2 class="text-xl font-bold text-white text-center">Programar Cita Médica</h2>
        </div>

        <form (ngSubmit)="enviarCita()" class="p-6 space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-700">Para que mascota?</label>
                <select name="mascota" [(ngModel)]="cita.mascota" required
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 p-2 border">
                    <option [ngValue]="null" disabled>Selecciona una mascota</option>
                    <option *ngFor="let m of listaMascotas" [ngValue]="{ id: m.id}">
                        {{ m.nombre }} ({{ m.tipo }})
                    </option>
                </select>
                <small *ngIf="errores.mascota" class="text-red-500 text-xs">{{ errores.mascota }}</small>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Fecha y Hora</label>
                <input type="datetime-local" name="fechaHora" [(ngModel)]="cita.fechaHora" (input)="validarFechaHora()"
                    required
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 p-2 border">
                <small *ngIf="errores.fechaHora" class="text-red-500 text-xs">{{ errores.fechaHora }}</small>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Motivo de la consulta</label>
                <textarea name="motivo" [(ngModel)]="cita.motivo" (input)="validarMotivo()" rows="3"
                    placeholder="Ej: Tiene tos o le toca vacuna..."
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 p-2 border" required></textarea>
                <small *ngIf="errores.motivo" class="text-red-500 text-xs">{{ errores.motivo }}</small>
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit"
                    class="flex-1 bg-green-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-600 shadow-md transition">
                    Confirmar
                </button>
            </div>
        </form>
    </div>
</div>
