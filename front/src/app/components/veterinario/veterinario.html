<div class="min-h-screen bg-gray-50 p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div class="flex gap-x-5">
                <h1 class="text-3xl font-bold text-gray-800 border-l-4 border-green-600 pl-4">
                    Gestión de Citas Entrantes
                </h1>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z" />
                </svg>
            </div>
            <span class="bg-green-100 text-green-800 text-sm font-semibold px-3 py-1 rounded-full">
                Veterinario Activo
            </span>
        </div>

        <div class="bg-white shadow-xl rounded-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-green-100 uppercase text-sm text-gray-600">
                    <tr>
                        <th class="p-4">Mascota</th>
                        <th class="p-4">Motivo</th>
                        <th class="p-4">Fecha y Hora</th>
                        <th class="p-4 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr *ngFor="let cita of citasPendientes" class="hover:bg-blue-50 transition">
                        <td class="p-4 font-medium text-gray-900">{{ cita.nombreMascota }}</td>
                        <td class="p-4 text-gray-600">{{ cita.motivo }}</td>
                        <td class="p-4 text-gray-600">{{ cita.fechaHora | date:'short' }}</td>
                        <td class="p-4 flex justify-center gap-3">
                            <button (click)="gestionarCita(cita.id, 'CONFIRMADA')"
                                class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-md">
                                Aceptar
                            </button>
                            <button (click)="gestionarCita(cita.id, 'RECHAZADA')"
                                class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-md">
                                Rechazar
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="citasPendientes.length === 0">
                        <td colspan="4" class="p-10 text-center text-gray-400 italic">
                            No tienes solicitudes de citas pendientes por ahora.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
