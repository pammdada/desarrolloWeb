<div class="min-h-screen bg-gray-50 flex flex-col">
  @if (!showSidebar()) {
    <app-navbar />
  }
  <div class="flex flex-1">
    @if (showSidebar()) {
      <app-sidebar />
    }
    <main class="flex-1">
      <router-outlet />
    </main>
  </div>
  @if (!isAuthenticated() || isPublicRoute()) {
    <app-footer />
  }
</div>
